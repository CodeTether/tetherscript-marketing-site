apiVersion: apps/v1
kind: Deployment
metadata:
  name: tetherscript-marketing
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: tetherscript-marketing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tetherscript-marketing
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: site-content
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
      volumes:
        - name: site-content
          configMap:
            name: tetherscript-marketing-site-content
        - name: nginx-config
          configMap:
            name: tetherscript-marketing-nginx
