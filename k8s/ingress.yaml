apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tetherscript-marketing
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-issuer
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - script.codetether.run
      secretName: script-codetether-run-tls
  rules:
    - host: script.codetether.run
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tetherscript-marketing
                port:
                  number: 80
